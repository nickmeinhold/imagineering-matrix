# Appservice registration for the relay bot.
#
# Register with Continuwuity via the admin room:
#   !admin appservices register
#   <paste this file's contents>
#
# Generate tokens:
#   python -c "import secrets; print(secrets.token_hex(32))"

id: relay-bot
url: http://relay-bot:8009
as_token: CHANGE_ME_AS_TOKEN
hs_token: CHANGE_ME_HS_TOKEN
sender_localpart: relay-bot
namespaces:
  users:
    - exclusive: true
      regex: "@_relay_.*:CHANGE_ME_DOMAIN"
    # Allow impersonating double-puppeted users for reactions.
    # Bridges only forward reactions from logged-in users, so the relay bot
    # sends reactions as the double-puppeted user (non-exclusive to avoid
    # conflicts with the bridge appservices that also impersonate this user).
    - exclusive: false
      regex: "@nick:CHANGE_ME_DOMAIN"
  aliases: []
  rooms: []
rate_limited: false
